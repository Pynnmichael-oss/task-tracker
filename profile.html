<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Michael Pynn</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .profile-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Profile Header */
        .profile-header {
            background: white;
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 32px;
            border: 1px solid #f0f0f0;
            display: flex;
            gap: 32px;
            align-items: start;
        }

        .profile-picture {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #667eea;
            flex-shrink: 0;
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .profile-email {
            color: #666;
            font-size: 16px;
            margin-bottom: 16px;
        }

        .profile-bio {
            color: #1a1a1a;
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .profile-stats {
            display: flex;
            gap: 32px;
            margin-top: 24px;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 14px;
            color: #666;
            margin-top: 4px;
        }

        /* Content Sections */
        .content-section {
            background: white;
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
            border: 1px solid #f0f0f0;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a1a;
        }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #1a1a1a;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        /* Album Grid */
        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 24px;
        }

        .create-album-card {
            aspect-ratio: 4/3;
            border: 2px dashed #ccc;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #fafafa;
        }

        .create-album-card:hover {
            border-color: #667eea;
            background: white;
        }

        .create-icon {
            font-size: 48px;
            color: #667eea;
            margin-bottom: 8px;
        }

        .album-card {
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s;
            border: 1px solid #f0f0f0;
            background: white;
        }

        .album-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        .album-cover {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
            background: #f0f0f0;
        }

        .album-info {
            padding: 16px;
        }

        .album-name {
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 4px;
        }

        .photo-count {
            font-size: 14px;
            color: #666;
        }

        /* Album Detail View */
        .album-detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .album-detail-title {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a1a;
        }

        .album-photo-count {
            color: #666;
            font-size: 14px;
        }

        /* Photo Grid */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }

        .photo-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .photo-item:hover img {
            transform: scale(1.05);
        }

        .photo-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .photo-item:hover .photo-overlay {
            opacity: 1;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1a1a1a;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #f0f0f0;
            border-radius: 8px;
            font-size: 16px;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .cover-upload-area {
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .cover-upload-area:hover {
            border-color: #667eea;
            background: #f8f9fa;
        }

        .cover-preview {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            margin-top: 12px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .modal-actions .btn {
            flex: 1;
            padding: 12px;
        }

        /* Image Modal */
        .image-modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
        }

        .image-modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 40px;
            cursor: pointer;
        }

        /* States */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            .profile-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .profile-stats {
                justify-content: center;
            }

            .section-header {
                flex-direction: column;
                gap: 12px;
                align-items: stretch;
            }

            .album-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-brand">Michael Pynn</a>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="feed.html" class="logged-in-only-inline">Feed</a></li>
                <li><a href="tasks.html" class="logged-in-only-inline">Tasks</a></li>
                <li><a href="calendar.html" class="logged-in-only-inline">Calendar</a></li>
                <li id="authButton" style="margin-left: auto;"></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="profile-container">
            <!-- Profile Header -->
            <div id="profileHeader" class="loading">Loading profile...</div>

            <!-- Albums Section -->
            <div id="albumsSection" class="content-section hidden">
                <!-- Albums Grid View -->
                <div id="albumsView">
                    <div class="section-header">
                        <div class="section-title">Photo Albums</div>
                        <button class="btn btn-primary hidden" id="createAlbumBtn">+ Create Album</button>
                    </div>
                    <div class="album-grid" id="albumGrid"></div>
                </div>

                <!-- Album Detail View -->
                <div id="albumDetailView" class="hidden">
                    <div class="album-detail-header">
                        <div>
                            <button class="btn btn-secondary" id="backBtn">← Back to Albums</button>
                        </div>
                        <div style="flex: 1; text-align: center;">
                            <h2 class="album-detail-title" id="albumTitle"></h2>
                            <p class="album-photo-count" id="albumPhotoCount"></p>
                        </div>
                        <div>
                            <button class="btn btn-primary hidden" id="uploadPhotosBtn">+ Add Photos</button>
                            <input type="file" id="photoInput" accept="image/*" multiple style="display: none;">
                        </div>
                    </div>
                    <div class="photo-grid" id="photoGrid"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Create Album Modal -->
    <div class="modal" id="createAlbumModal">
        <div class="modal-content">
            <div class="modal-header">Create New Album</div>
            
            <div class="form-group">
                <label class="form-label">Album Name</label>
                <input type="text" class="form-input" id="albumNameInput" placeholder="e.g., Summer Vacation" maxlength="50">
            </div>

            <div class="form-group">
                <label class="form-label">Cover Photo</label>
                <div class="cover-upload-area" id="coverUploadArea">
                    <div>📷 Click to select cover photo</div>
                    <input type="file" id="coverInput" accept="image/*" style="display: none;">
                    <img id="coverPreview" class="cover-preview" style="display: none;">
                </div>
            </div>

            <div class="modal-actions">
                <button class="btn btn-primary" id="createAlbumConfirm">Create Album</button>
                <button class="btn btn-secondary" id="cancelAlbumBtn">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Image Modal -->
    <div class="image-modal" id="imageModal">
        <span class="modal-close" id="imageModalClose">&times;</span>
        <img id="modalImage" src="" alt="Full size photo">
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <script src="auth.js"></script>

    <script>
        // Get user ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const profileUserId = urlParams.get('user');
        
        if (!profileUserId) {
            window.location.href = '/task-tracker/index.html';
        }

        // State
        let isOwnProfile = false;
        let currentAlbumId = null;
        let selectedCoverFile = null;
        let albumsRef = null;

        // Elements
        const profileHeader = document.getElementById('profileHeader');
        const albumsSection = document.getElementById('albumsSection');
        const albumsView = document.getElementById('albumsView');
        const albumDetailView = document.getElementById('albumDetailView');
        const albumGrid = document.getElementById('albumGrid');
        const photoGrid = document.getElementById('photoGrid');
        const createAlbumBtn = document.getElementById('createAlbumBtn');
        const createAlbumModal = document.getElementById('createAlbumModal');
        const albumNameInput = document.getElementById('albumNameInput');
        const coverUploadArea = document.getElementById('coverUploadArea');
        const coverInput = document.getElementById('coverInput');
        const coverPreview = document.getElementById('coverPreview');
        const createAlbumConfirm = document.getElementById('createAlbumConfirm');
        const cancelAlbumBtn = document.getElementById('cancelAlbumBtn');
        const backBtn = document.getElementById('backBtn');
        const uploadPhotosBtn = document.getElementById('uploadPhotosBtn');
        const photoInput = document.getElementById('photoInput');
        const albumTitle = document.getElementById('albumTitle');
        const albumPhotoCount = document.getElementById('albumPhotoCount');
        const imageModal = document.getElementById('imageModal');
        const modalImage = document.getElementById('modalImage');
        const imageModalClose = document.getElementById('imageModalClose');

        // Load profile on auth
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                isOwnProfile = user.uid === profileUserId;
                albumsRef = db.collection('users').doc(profileUserId).collection('albums');
                await loadProfile();
            } else {
                // Not logged in, can still view profile
                albumsRef = db.collection('users').doc(profileUserId).collection('albums');
                await loadProfile();
            }
        });

        // Load Profile
        async function loadProfile() {
            try {
                const profileDoc = await db.collection('users').doc(profileUserId).collection('profile').doc('info').get();
                
                if (!profileDoc.exists) {
                    profileHeader.innerHTML = '<div class="loading">Profile not found</div>';
                    return;
                }

                const profile = profileDoc.data();

                // Count albums and photos
                const albumsSnapshot = await albumsRef.get();
                const albumCount = albumsSnapshot.size;

                let photoCount = 0;
                for (const albumDoc of albumsSnapshot.docs) {
                    const photosSnapshot = await albumsRef.doc(albumDoc.id).collection('photos').get();
                    photoCount += photosSnapshot.size;
                }

                // Render profile header
                profileHeader.innerHTML = `
                    <div class="profile-header">
                        <img src="${profile.photoURL}" class="profile-picture" alt="${profile.displayName}">
                        <div class="profile-info">
                            <h1 class="profile-name">${profile.displayName}</h1>
                            <div class="profile-email">${profile.email}</div>
                            ${profile.bio ? `<div class="profile-bio">${profile.bio}</div>` : ''}
                            
                            <div class="profile-stats">
                                <div class="stat">
                                    <div class="stat-number">${albumCount}</div>
                                    <div class="stat-label">Albums</div>
                                </div>
                                <div class="stat">
                                    <div class="stat-number">${photoCount}</div>
                                    <div class="stat-label">Photos</div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                // Show albums section
                albumsSection.classList.remove('hidden');

                // Show create button if own profile
                if (isOwnProfile) {
                    createAlbumBtn.classList.remove('hidden');
                }

                // Load albums
                loadAlbums();

            } catch (error) {
                console.error('Error loading profile:', error);
                profileHeader.innerHTML = '<div class="loading">Error loading profile</div>';
            }
        }

        // Load Albums
        function loadAlbums() {
            albumsRef.orderBy('createdAt', 'desc').onSnapshot((snapshot) => {
                renderAlbums(snapshot.docs.map(doc => ({id: doc.id, ...doc.data()})));
            });
        }

        // Render Albums
        function renderAlbums(albums) {
            albumGrid.innerHTML = '';

            // Create album card (own profile only)
            if (isOwnProfile) {
                const createCard = document.createElement('div');
                createCard.className = 'create-album-card';
                createCard.innerHTML = `
                    <div class="create-icon">+</div>
                    <div style="font-weight: 600; color: #667eea;">Create Album</div>
                `;
                createCard.onclick = () => createAlbumModal.classList.add('active');
                albumGrid.appendChild(createCard);
            }

            // Album cards
            if (albums.length === 0 && !isOwnProfile) {
                albumGrid.innerHTML = '<div class="empty-state"><div class="empty-icon">📷</div><p>No albums yet</p></div>';
                return;
            }

            albums.forEach(album => {
                const card = document.createElement('div');
                card.className = 'album-card';
                card.innerHTML = `
                    <img src="${album.coverUrl}" class="album-cover" alt="${album.name}">
                    <div class="album-info">
                        <div class="album-name">${album.name}</div>
                        <div class="photo-count">${album.photoCount || 0} photos</div>
                    </div>
                `;
                card.onclick = () => openAlbum(album.id, album.name);
                albumGrid.appendChild(card);
            });
        }

        // Create Album Modal Handlers
        coverUploadArea.onclick = () => coverInput.click();
        coverInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                selectedCoverFile = file;
                const reader = new FileReader();
                reader.onload = (e) => {
                    coverPreview.src = e.target.result;
                    coverPreview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        };

        createAlbumBtn.onclick = () => createAlbumModal.classList.add('active');
        cancelAlbumBtn.onclick = () => {
            createAlbumModal.classList.remove('active');
            albumNameInput.value = '';
            coverPreview.style.display = 'none';
            selectedCoverFile = null;
        };

        createAlbumConfirm.onclick = async () => {
            const name = albumNameInput.value.trim();
            if (!name || !selectedCoverFile) {
                alert('Please provide album name and cover photo');
                return;
            }

            try {
                createAlbumConfirm.disabled = true;
                createAlbumConfirm.textContent = 'Creating...';

                const user = auth.currentUser;
                const coverFileName = `users/${user.uid}/covers/${Date.now()}_${selectedCoverFile.name}`;
                const coverRef = storage.ref(coverFileName);
                await coverRef.put(selectedCoverFile);
                const coverUrl = await coverRef.getDownloadURL();

                await albumsRef.add({
                    name: name,
                    coverUrl: coverUrl,
                    coverFileName: coverFileName,
                    photoCount: 0,
                    createdAt: new Date().toISOString()
                });

                albumNameInput.value = '';
                coverPreview.style.display = 'none';
                selectedCoverFile = null;
                createAlbumModal.classList.remove('active');
                createAlbumConfirm.disabled = false;
                createAlbumConfirm.textContent = 'Create Album';

            } catch (error) {
                console.error('Error creating album:', error);
                alert('Error creating album');
                createAlbumConfirm.disabled = false;
                createAlbumConfirm.textContent = 'Create Album';
            }
        };

        // Open Album
        function openAlbum(albumId, albumName) {
            currentAlbumId = albumId;
            albumTitle.textContent = albumName;
            albumsView.classList.add('hidden');
            albumDetailView.classList.remove('hidden');

            if (isOwnProfile) {
                uploadPhotosBtn.classList.remove('hidden');
            }

            loadPhotos(albumId);
        }

        // Back to Albums
        backBtn.onclick = () => {
            currentAlbumId = null;
            albumDetailView.classList.add('hidden');
            albumsView.classList.remove('hidden');
        };

        // Upload Photos
        uploadPhotosBtn.onclick = () => photoInput.click();
        photoInput.onchange = async (e) => {
            const files = e.target.files;
            if (files.length === 0) return;

            const user = auth.currentUser;
            let uploadedPhotos = [];

            for (let file of files) {
                if (!file.type.startsWith('image/')) continue;

                const fileName = `users/${user.uid}/albums/${currentAlbumId}/${Date.now()}_${file.name}`;
                const storageRef = storage.ref(fileName);

                try {
                    await storageRef.put(file);
                    const url = await storageRef.getDownloadURL();

                    await albumsRef.doc(currentAlbumId).collection('photos').add({
                        url: url,
                        fileName: fileName,
                        uploadedAt: new Date().toISOString()
                    });

                    uploadedPhotos.push({url, fileName});

                    // Update photo count
                    const albumDoc = await albumsRef.doc(currentAlbumId).get();
                    await albumsRef.doc(currentAlbumId).update({
                        photoCount: (albumDoc.data().photoCount || 0) + 1
                    });

                } catch (error) {
                    console.error('Error uploading photo:', error);
                }
            }

            photoInput.value = '';

            // Ask about sharing to feed with custom dialog
            if (uploadedPhotos.length > 0) {
                showShareDialog(uploadedPhotos);
            }
        };

        // Show Share Dialog
        let pendingSharePhotos = [];
        function showShareDialog(photos) {
            pendingSharePhotos = photos;
            const shareDialog = document.createElement('div');
            shareDialog.className = 'modal active';
            shareDialog.id = 'shareDialog';
            shareDialog.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header">Upload Complete!</div>
                    <p style="margin-bottom: 24px;">Share ${photos.length} photo(s) to your feed?</p>
                    <div class="modal-actions">
                        <button class="btn btn-primary" onclick="confirmShare(true)">Yes, Share</button>
                        <button class="btn btn-secondary" onclick="confirmShare(false)">No Thanks</button>
                    </div>
                </div>
            `;
            document.body.appendChild(shareDialog);
        }

        async function confirmShare(share) {
            const shareDialog = document.getElementById('shareDialog');
            if (shareDialog) shareDialog.remove();
            
            if (share) {
                await sharePhotosToFeed(pendingSharePhotos);
            }
            pendingSharePhotos = [];
        }
        window.confirmShare = confirmShare;

        // Share to Feed
        async function sharePhotosToFeed(photos) {
            try {
                const user = auth.currentUser;
                const userProfile = getUserProfile();
                const albumDoc = await albumsRef.doc(currentAlbumId).get();
                const albumName = albumDoc.data().name;

                for (const photo of photos) {
                    await db.collection('feed').add({
                        userId: user.uid,
                        userName: userProfile.displayName,
                        userPhotoURL: userProfile.photoURL,
                        albumName: albumName,
                        photoURL: photo.url,
                        caption: '',
                        timestamp: new Date().toISOString()
                    });
                }

                alert('Shared to feed!');
            } catch (error) {
                console.error('Error sharing to feed:', error);
            }
        }

        // Load Photos
        function loadPhotos(albumId) {
            albumsRef.doc(albumId).collection('photos')
                .orderBy('uploadedAt', 'desc')
                .onSnapshot((snapshot) => {
                    const photos = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
                    albumPhotoCount.textContent = `${photos.length} photo${photos.length !== 1 ? 's' : ''}`;
                    renderPhotos(photos);
                });
        }

        // Render Photos
        function renderPhotos(photos) {
            if (photos.length === 0) {
                photoGrid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📷</div>
                        <p>No photos yet. ${isOwnProfile ? 'Click "Add Photos" to upload!' : ''}</p>
                    </div>
                `;
                return;
            }

            photoGrid.innerHTML = '';
            photos.forEach(photo => {
                const item = document.createElement('div');
                item.className = 'photo-item';
                item.innerHTML = `
                    <img src="${photo.url}" alt="Photo">
                    ${isOwnProfile ? `
                        <div class="photo-overlay">
                            <button class="btn btn-danger" onclick="event.stopPropagation(); deletePhoto('${photo.id}', '${photo.fileName}')">Delete</button>
                        </div>
                    ` : ''}
                `;
                
                // Click photo to view full size
                item.onclick = (e) => {
                    // Don't open if clicking delete button
                    if (e.target.tagName === 'BUTTON') return;
                    modalImage.src = photo.url;
                    imageModal.classList.add('active');
                };

                photoGrid.appendChild(item);
            });
        }

        // Delete Photo
        async function deletePhoto(photoId, fileName) {
            if (!confirm('Delete this photo?')) return;

            try {
                await storage.ref(fileName).delete();
                await albumsRef.doc(currentAlbumId).collection('photos').doc(photoId).delete();

                const albumDoc = await albumsRef.doc(currentAlbumId).get();
                await albumsRef.doc(currentAlbumId).update({
                    photoCount: Math.max(0, (albumDoc.data().photoCount || 1) - 1)
                });
            } catch (error) {
                console.error('Error deleting photo:', error);
                alert('Error deleting photo');
            }
        }
        window.deletePhoto = deletePhoto;

        // Image Modal
        imageModalClose.onclick = () => imageModal.classList.remove('active');
        imageModal.onclick = (e) => {
            if (e.target === imageModal) imageModal.classList.remove('active');
        };
    </script>
</body>
</html>
