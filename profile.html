<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TouchGrass · Profile</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3d9c2f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="TouchGrass">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; }

        .profile-container { max-width: 900px; margin: 0 auto; padding: 0 0 60px; }

        .profile-hero {
            position: relative;
            background: linear-gradient(135deg, #1e6b14 0%, #3d9c2f 45%, #6dd832 80%, #c8f032 100%);
            padding: 60px 40px 80px;
            text-align: center;
            overflow: hidden;
        }

        .profile-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            opacity: 0.4;
            pointer-events: none;
        }

        .profile-hero::after {
            content: '';
            position: absolute;
            width: 400px; height: 400px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            top: -150px; right: -100px;
            pointer-events: none;
        }

        .hero-orb { position: absolute; width: 250px; height: 250px; border-radius: 50%; background: rgba(255,255,255,0.05); bottom: -80px; left: -60px; pointer-events: none; }

        .avatar-wrapper { position: relative; display: inline-block; margin-bottom: 20px; cursor: pointer; }

        .profile-picture { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid rgba(255,255,255,0.9); box-shadow: 0 8px 32px rgba(0,0,0,0.25); display: block; transition: transform 0.3s, box-shadow 0.3s; }
        .avatar-wrapper:hover .profile-picture { transform: scale(1.04); box-shadow: 0 12px 40px rgba(0,0,0,0.35); }

        .avatar-upload-overlay { position: absolute; inset: 0; border-radius: 50%; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; font-size: 28px; }
        .avatar-wrapper.own-profile:hover .avatar-upload-overlay { opacity: 1; }

        .profile-name { font-family: 'Playfair Display', serif; font-size: 36px; color: white; margin-bottom: 6px; letter-spacing: -0.5px; text-shadow: 0 2px 12px rgba(0,0,0,0.2); position: relative; }
        .profile-bio { color: rgba(255,255,255,0.85); font-size: 15px; font-weight: 300; max-width: 440px; margin: 0 auto 20px; line-height: 1.6; position: relative; }

        .voice-memo-btn { display: inline-flex; align-items: center; gap: 7px; background: rgba(255,255,255,0.15); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.25); color: white; padding: 7px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; margin-bottom: 20px; transition: all 0.2s; position: relative; }
        .voice-memo-btn:hover { background: rgba(255,255,255,0.25); }

        .voice-dot { width: 8px; height: 8px; border-radius: 50%; background: #ff6b6b; animation: pulse-dot 1.5s ease-in-out infinite; }
        @keyframes pulse-dot { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.3); opacity: 0.7; } }

        .voice-player { display: none; margin-bottom: 16px; position: relative; }
        .voice-player.visible { display: block; }
        .voice-player audio { height: 36px; border-radius: 20px; filter: brightness(1.1); }

        .social-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; position: relative; margin-top: 4px; }
        .social-icon-link { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; background: rgba(255,255,255,0.15); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; color: white; font-size: 13px; font-weight: 500; text-decoration: none; transition: all 0.2s; }
        .social-icon-link:hover { background: rgba(255,255,255,0.3); transform: translateY(-1px); }

        .stats-strip { display: flex; justify-content: center; gap: 0; background: white; border-radius: 16px; margin: -28px 24px 0; box-shadow: 0 4px 24px rgba(0,0,0,0.1); position: relative; z-index: 10; overflow: hidden; }
        .stat-item { flex: 1; text-align: center; padding: 20px 16px; border-right: 1px solid #f0f0f0; }
        .stat-item:last-child { border-right: none; }
        .stat-number { font-size: 26px; font-weight: 700; color: #3d9c2f; font-family: 'Playfair Display', serif; }
        .stat-label { font-size: 12px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

        .edit-profile-btn { position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,0.2); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .edit-profile-btn:hover { background: rgba(255,255,255,0.3); }

        .about-section { background: white; border-radius: 16px; padding: 28px 32px; margin: 24px 24px 0; border: 1px solid #f0f0f0; }
        .about-section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .about-section-title { font-family: 'Playfair Display', serif; font-size: 20px; color: #1a1a1a; }
        .about-text { color: #444; line-height: 1.8; font-size: 15px; white-space: pre-wrap; }
        .btn-edit-subtle { padding: 6px 14px; background: #f0f0f0; color: #666; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; transition: background 0.2s; }
        .btn-edit-subtle:hover { background: #e0e0e0; }

        .albums-section { margin: 24px 24px 0; }
        .content-section { background: white; border-radius: 16px; padding: 28px 32px; border: 1px solid #f0f0f0; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .section-title { font-family: 'Playfair Display', serif; font-size: 20px; color: #1a1a1a; }

        .album-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; }
        .album-grid-cell { position: relative; width: 100%; padding-bottom: 100%; overflow: hidden; cursor: pointer; }
        .create-album-card { position: absolute; inset: 0; border: 2px dashed #d0d0d0; border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fafafa; color: #3d9c2f; font-weight: 600; font-size: 13px; gap: 6px; transition: all 0.2s; }
        .create-album-card:hover { border-color: #3d9c2f; background: white; }
        .create-icon { font-size: 28px; }
        .album-card { position: absolute; inset: 0; overflow: hidden; cursor: pointer; border-radius: 4px; }
        .album-card:hover .album-cover { transform: scale(1.05); }
        .album-card:hover .album-overlay { opacity: 1; }
        .album-cover { width: 100%; height: 100%; object-fit: cover; background: #f0f0f0; transition: transform 0.3s; display: block; }
        .album-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.65)); padding: 20px 8px 8px; opacity: 0; transition: opacity 0.2s; }
        .album-name { font-weight: 600; color: white; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .photo-count { font-size: 11px; color: rgba(255,255,255,0.8); }
        @media (max-width: 768px) { .album-overlay { opacity: 1; } }

        .album-detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .album-detail-title { font-family: 'Playfair Display', serif; font-size: 24px; color: #1a1a1a; }
        .album-photo-count { color: #888; font-size: 13px; margin-top: 2px; }

        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
        .photo-item { position: relative; aspect-ratio: 1; border-radius: 10px; overflow: hidden; cursor: pointer; }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
        .photo-item:hover img { transform: scale(1.06); }
        .photo-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
        .photo-item:hover .photo-overlay { opacity: 1; }

        .btn { padding: 9px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
        .btn-primary { background: #3d9c2f; color: white; }
        .btn-primary:hover { background: #348a26; }
        .btn-secondary { background: #f0f0f0; color: #1a1a1a; }
        .btn-secondary:hover { background: #e0e0e0; }
        .btn-danger { background: #dc3545; color: white; font-size: 13px; padding: 7px 14px; }
        .btn-danger:hover { background: #c82333; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 20px; padding: 32px; max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto; }
        .modal-header { font-family: 'Playfair Display', serif; font-size: 22px; margin-bottom: 24px; color: #1a1a1a; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; color: #1a1a1a; }
        .form-input { width: 100%; padding: 12px; border: 2px solid #f0f0f0; border-radius: 10px; font-size: 15px; font-family: 'DM Sans', sans-serif; transition: border-color 0.2s; }
        .form-input:focus { outline: none; border-color: #3d9c2f; }
        .cover-upload-area { border: 2px dashed #d0d0d0; border-radius: 10px; padding: 32px; text-align: center; cursor: pointer; transition: all 0.2s; color: #888; }
        .cover-upload-area:hover { border-color: #3d9c2f; background: #f8f9fa; }
        .cover-preview { max-width: 100%; max-height: 180px; border-radius: 8px; margin-top: 12px; }
        .modal-actions { display: flex; gap: 12px; margin-top: 24px; }
        .modal-actions .btn { flex: 1; padding: 12px; }

        .image-modal { display: none; position: fixed; z-index: 2000; inset: 0; background: rgba(0,0,0,0.95); }
        .image-modal.active { display: flex; align-items: center; justify-content: center; }
        .image-modal img { max-width: 90%; max-height: 90%; object-fit: contain; border-radius: 4px; }
        .modal-close { position: absolute; top: 20px; right: 32px; color: white; font-size: 36px; cursor: pointer; line-height: 1; }

        .loading { text-align: center; padding: 60px 20px; color: #999; }
        .spinner { width: 36px; height: 36px; border: 3px solid #f0f0f0; border-top-color: #3d9c2f; border-radius: 50%; animation: spin 0.9s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-state { text-align: center; padding: 60px 20px; color: #999; }
        .empty-icon { font-size: 48px; margin-bottom: 16px; }
        .hidden { display: none !important; }

        .album-delete-btn { position: absolute; top: 6px; right: 6px; width: 28px; height: 28px; border-radius: 50%; background: rgba(0,0,0,0.6); border: none; color: white; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; z-index: 10; }
        .album-card:hover .album-delete-btn { opacity: 1; }
        @media (max-width: 768px) { .album-delete-btn { opacity: 1; } }

        .photo-delete-btn { width: 36px; height: 36px; border-radius: 50%; background: rgba(220,53,69,0.85); border: none; color: white; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .photo-delete-btn:hover { background: rgba(200,35,51,1); }

        .bg-picker-btn { position: absolute; bottom: 40px; right: 16px; background: rgba(255,255,255,0.2); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
        .bg-picker-btn:hover { background: rgba(255,255,255,0.35); }

        .bg-swatches { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
        .bg-swatch { aspect-ratio: 16/7; border-radius: 8px; cursor: pointer; border: 3px solid transparent; transition: all 0.2s; }
        .bg-swatch:hover { transform: scale(1.04); }
        .bg-swatch.selected { border-color: #3d9c2f; box-shadow: 0 0 0 2px white, 0 0 0 4px #3d9c2f; }

        .bg-upload-area { border: 2px dashed #d0d0d0; border-radius: 10px; padding: 24px; text-align: center; cursor: pointer; color: #888; font-size: 14px; transition: all 0.2s; margin-top: 8px; }
        .bg-upload-area:hover { border-color: #3d9c2f; background: #f8f9fa; color: #3d9c2f; }

        @media (max-width: 768px) {
            .profile-container { padding: 0 0 80px; }
            .profile-hero { padding: 48px 20px 72px; }
            .profile-name { font-size: 26px; }
            .stats-strip { margin: -24px 12px 0; }
            .about-section, .albums-section { margin-left: 12px; margin-right: 12px; }
            .content-section { padding: 16px; }
            .about-section { padding: 16px 20px; }
            .photo-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 8px; }
            .album-detail-header { flex-direction: column; gap: 10px; align-items: stretch; text-align: center; }
            .album-detail-header button { width: 100%; }
            .modal-content { padding: 20px; width: 95%; max-height: 85vh; border-radius: 16px; }
            .edit-profile-btn { top: 12px; right: 12px; font-size: 11px; padding: 5px 10px; }
            .bg-picker-btn { bottom: 12px; right: 12px; font-size: 11px; padding: 5px 10px; }
            .social-row { gap: 6px; }
            .social-icon-link { font-size: 12px; padding: 6px 10px; }
            .bg-swatches { grid-template-columns: repeat(4, 1fr); gap: 8px; }
            .stat-item { padding: 14px 8px; }
        }

        @media (max-width: 380px) {
            .photo-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 6px; }
            .stat-number { font-size: 18px; }
            .bg-swatches { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>

        <div class="nav-container">

        <div id="profileHeader">
            <div class="loading" style="padding: 80px 20px;">

                <p>Loading profile...</p>
            </div>

                <button class="btn btn-primary" id="saveBgBtn">Save</button>
                <button class="btn btn-secondary" id="cancelBgBtn">Cancel</button>
            </div>
        </div>
    </div>

    <input type="file" id="avatarInput" accept="image/*" style="display:none;">

    <div class="modal" id="createAlbumModal">
        <div class="modal-content">
            <div class="modal-header">Create New Album</div>

                <label class="form-label">Album Name</label>

        <img id="modalImage" src="" alt="Full size photo">
    </div>

                <label class="form-label">Bio</label>
                <input type="text" class="form-input" id="editBioInput" placeholder="Short tagline under your name" maxlength="100">
            </div>

                    <div style="display:flex; align-items:center; gap:10px;"><span style="width:28px; text-align:center;">🐦</span><input type="text" class="form-input" id="editTwitter" placeholder="Twitter username"></div>

            <a href="feed.html" class="bottom-tab"><span class="bottom-tab-icon">📸</span><span class="bottom-tab-label">Feed</span></a>
            <a href="#" class="bottom-tab active" id="mobileProfileTab"><span class="bottom-tab-icon">👤</span><span class="bottom-tab-label">Profile</span></a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const profileUserId = urlParams.get('user');
        if (!profileUserId) window.location.href = 'index.html';

        let isOwnProfile = false;
        let currentAlbumId = null;
        let currentAlbumCoverFileName = null;
        let selectedCoverFile = null;
        let albumsRef = null;

        async function sendNotifToAll(notif) {
            const snap = await db.collectionGroup('profile').get();
            const uids = snap.docs.filter(d => d.id === 'info').map(d => d.ref.parent.parent.id);

        let editMediaRecorder = null;

        document.getElementById('editRecordBtn').addEventListener('click', async () => {
            const btn = document.getElementById('editRecordBtn');
            const status = document.getElementById('editRecordingStatus');
            const timerDisplay = document.getElementById('editRecordingTimer');
            const playback = document.getElementById('editAudioPlayback');
            if (!editMediaRecorder || editMediaRecorder.state === 'inactive') {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    editMediaRecorder = new MediaRecorder(stream);
                    editAudioChunks = []; editRecordingSeconds = 0;
                    editMediaRecorder.ondataavailable = (e) => editAudioChunks.push(e.data);
                    editMediaRecorder.onstop = () => {
                        editAudioBlob = new Blob(editAudioChunks, { type: 'audio/webm' });
                        playback.src = URL.createObjectURL(editAudioBlob); playback.style.display = 'block';
                        status.textContent = 'New recording ready!'; btn.textContent = '🎤'; btn.style.background = '#3d9c2f';
                        stream.getTracks().forEach(t => t.stop());
                    };
                    editMediaRecorder.start(); btn.textContent = '⏹️'; btn.style.background = '#dc3545'; status.textContent = 'Recording... (click to stop)'; timerDisplay.style.display = 'block';
                    editRecordingTimer = setInterval(() => {
                        editRecordingSeconds++;
                        const m = Math.floor(editRecordingSeconds / 60); const s = editRecordingSeconds % 60;
                        timerDisplay.textContent = `${m}:${s.toString().padStart(2, '0')}`;
                        if (editRecordingSeconds >= 60) btn.click();
                    }, 1000);
                } catch(err) { showToast('Could not access microphone. Please allow microphone access.', 'error'); }
            } else { editMediaRecorder.stop(); clearInterval(editRecordingTimer); document.getElementById('editRecordingTimer').style.display = 'none'; }
        });

        async function _deletePhoto(photoId, fileName) {
            try {
                const photoDoc = await albumsRef.doc(currentAlbumId).collection('photos').doc(photoId).get();
                const photoURL = photoDoc.exists ? photoDoc.data().url : null;
                try { await storage.ref(fileName).delete(); } catch(e) {}
                await albumsRef.doc(currentAlbumId).collection('photos').doc(photoId).delete();
                const albumDoc = await albumsRef.doc(currentAlbumId).get();
                await albumsRef.doc(currentAlbumId).update({ photoCount: Math.max(0, (albumDoc.data().photoCount || 1) - 1) });
                if (photoURL) {
                    const feedSnap = await db.collection('feed').where('userId', '==', profileUserId).where('photoURL', '==', photoURL).get();
                    const batch = db.batch(); feedSnap.docs.forEach(d => batch.delete(d.ref)); if (!feedSnap.empty) await batch.commit();
                }
            } catch(err) { console.error('Delete error:', err); showToast('Error deleting photo. Try again.', 'error'); }
        }

        async function deleteAlbum(albumId, coverFileName) {
            try {
                const photosSnap = await albumsRef.doc(albumId).collection('photos').get();
                const photoURLs = photosSnap.docs.map(d => d.data().url).filter(Boolean);
                const batch = db.batch();
                for (const photoDoc of photosSnap.docs) { try { await storage.ref(photoDoc.data().fileName).delete(); } catch(e) {} batch.delete(photoDoc.ref); }
                await batch.commit();
                if (coverFileName) { try { await storage.ref(coverFileName).delete(); } catch(e) {} }
                await albumsRef.doc(albumId).delete();
                if (photoURLs.length > 0) {
                    const chunkSize = 30;
                    for (let i = 0; i < photoURLs.length; i += chunkSize) {
                        const chunk = photoURLs.slice(i, i + chunkSize);
                        const feedSnap = await db.collection('feed').where('userId', '==', profileUserId).where('photoURL', 'in', chunk).get();
                        const feedBatch = db.batch(); feedSnap.docs.forEach(d => feedBatch.delete(d.ref)); if (!feedSnap.empty) await feedBatch.commit();
                    }
                }
                if (!albumDetailView.classList.contains('hidden')) { albumDetailView.classList.add('hidden'); albumsView.classList.remove('hidden'); currentAlbumId = null; }
            } catch(err) { console.error('Delete album error:', err); showToast('Error deleting album. Try again.', 'error'); }
        }

        imageModalClose.onclick = () => imageModal.classList.remove('active');
        imageModal.onclick = (e) => { if (e.target === imageModal) imageModal.classList.remove('active'); };

        document.getElementById('cancelProfileBtn').onclick = () => document.getElementById('editProfileModal').classList.remove('active');

        document.getElementById('saveProfileBtn').onclick = async () => {
            const btn = document.getElementById('saveProfileBtn');
            try {
                btn.disabled = true; btn.textContent = 'Saving...';
                const user = auth.currentUser;
                const bio = document.getElementById('editBioInput').value.trim();
                const updates = { bio, updatedAt: new Date().toISOString() };
                if (editAudioBlob) {
                    const vRef = storage.ref(`voice-memos/${user.uid}/${Date.now()}.webm`);
                    await vRef.put(editAudioBlob);
                    updates.voiceMemoURL = await vRef.getDownloadURL();
                    updates.voiceMemoDuration = editRecordingSeconds;
                }
                await db.collection('users').doc(profileUserId).collection('profile').doc('info').update(updates);
                const aboutText = document.getElementById('aboutTextarea').value.trim();
                await db.collection('users').doc(profileUserId).collection('profile').doc('about').set({ text: aboutText, updatedAt: new Date().toISOString() });
                await db.collection('users').doc(profileUserId).collection('profile').doc('socialLinks').set({
                    instagram: document.getElementById('editInstagram').value.trim(),
                    linkedin:  document.getElementById('editLinkedin').value.trim(),
                    twitter:   document.getElementById('editTwitter').value.trim(),
                    github:    document.getElementById('editGithub').value.trim(),
                    updatedAt: new Date().toISOString()
                });
                document.getElementById('editProfileModal').classList.remove('active');
                await loadProfile();
            } catch(err) { console.error('Save error:', err); showToast('Error saving. Please try again.', 'error'); }
            finally { btn.disabled = false; btn.textContent = 'Save Changes'; }
        };

        auth.onAuthStateChanged((user) => {
            const tab = document.getElementById('mobileProfileTab');
            if (tab && user) tab.href = `profile.html?user=${user.uid}`;
        });
    </script>

    <!-- ✅ Unregister old service workers -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => {
          regs.forEach(r => {
            if (!r.active?.scriptURL.includes('firebase-messaging-sw')) r.unregister();
          });
        });
      }
    </script>
</body>
</html>
