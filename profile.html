<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Michael Pynn</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ── Base ── */
        body { font-family: 'DM Sans', sans-serif; }

        .profile-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 0 60px;
        }

        /* ── Hero Banner ── */
        .profile-hero {
            position: relative;
            background: linear-gradient(135deg, #4a3f8f 0%, #667eea 45%, #9b6fd4 80%, #c084fc 100%);
            padding: 60px 40px 80px;
            text-align: center;
            overflow: hidden;
        }

        /* Subtle noise texture overlay */
        .profile-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            opacity: 0.4;
            pointer-events: none;
        }

        /* Decorative orbs */
        .profile-hero::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            top: -150px;
            right: -100px;
            pointer-events: none;
        }

        .hero-orb {
            position: absolute;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            bottom: -80px;
            left: -60px;
            pointer-events: none;
        }

        /* ── Avatar ── */
        .avatar-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .profile-picture {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255,255,255,0.9);
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
            display: block;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .avatar-wrapper:hover .profile-picture {
            transform: scale(1.04);
            box-shadow: 0 12px 40px rgba(0,0,0,0.35);
        }

        /* Camera icon overlay (own profile) */
        .avatar-upload-overlay {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: rgba(0,0,0,0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
            font-size: 28px;
        }

        .avatar-wrapper.own-profile:hover .avatar-upload-overlay {
            opacity: 1;
        }

        /* ── Hero Text ── */
        .profile-name {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            color: white;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 12px rgba(0,0,0,0.2);
            position: relative;
        }

        .profile-bio {
            color: rgba(255,255,255,0.85);
            font-size: 15px;
            font-weight: 300;
            max-width: 440px;
            margin: 0 auto 20px;
            line-height: 1.6;
            position: relative;
        }

        /* ── Voice Memo Button ── */
        .voice-memo-btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.25);
            color: white;
            padding: 7px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.2s;
            position: relative;
        }

        .voice-memo-btn:hover {
            background: rgba(255,255,255,0.25);
        }

        .voice-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff6b6b;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.7; }
        }

        /* Inline audio player (hidden by default) */
        .voice-player {
            display: none;
            margin-bottom: 16px;
            position: relative;
        }

        .voice-player.visible { display: block; }

        .voice-player audio {
            height: 36px;
            border-radius: 20px;
            filter: brightness(1.1);
        }

        /* ── Social Links Row ── */
        .social-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            position: relative;
            margin-top: 4px;
        }

        .social-icon-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            color: white;
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s;
        }

        .social-icon-link:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-1px);
        }

        /* ── Stats strip (pulled down over hero) ── */
        .stats-strip {
            display: flex;
            justify-content: center;
            gap: 0;
            background: white;
            border-radius: 16px;
            margin: -28px 24px 0;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            position: relative;
            z-index: 10;
            overflow: hidden;
        }

        .stat-item {
            flex: 1;
            text-align: center;
            padding: 20px 16px;
            border-right: 1px solid #f0f0f0;
        }

        .stat-item:last-child { border-right: none; }

        .stat-number {
            font-size: 26px;
            font-weight: 700;
            color: #667eea;
            font-family: 'Playfair Display', serif;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        /* ── Edit own profile button ── */
        .edit-profile-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 7px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .edit-profile-btn:hover { background: rgba(255,255,255,0.3); }

        /* ── About Section ── */
        .about-section {
            background: white;
            border-radius: 16px;
            padding: 28px 32px;
            margin: 24px 24px 0;
            border: 1px solid #f0f0f0;
        }

        .about-section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .about-section-title {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            color: #1a1a1a;
        }

        .about-text {
            color: #444;
            line-height: 1.8;
            font-size: 15px;
            white-space: pre-wrap;
        }

        .btn-edit-subtle {
            padding: 6px 14px;
            background: #f0f0f0;
            color: #666;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-edit-subtle:hover { background: #e0e0e0; }

        /* ── Albums Section ── */
        .albums-section {
            margin: 24px 24px 0;
        }

        .content-section {
            background: white;
            border-radius: 16px;
            padding: 28px 32px;
            border: 1px solid #f0f0f0;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            color: #1a1a1a;
        }

        /* ── Album Grid ── */
        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .create-album-card {
            aspect-ratio: 4/3;
            border: 2px dashed #d0d0d0;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            background: #fafafa;
            color: #667eea;
            font-weight: 600;
            font-size: 14px;
            gap: 8px;
        }

        .create-album-card:hover {
            border-color: #667eea;
            background: white;
            transform: translateY(-2px);
        }

        .create-icon { font-size: 32px; }

        .album-card {
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.25s, box-shadow 0.25s;
            border: 1px solid #f0f0f0;
            background: white;
        }

        .album-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 28px rgba(0,0,0,0.1);
        }

        .album-cover {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
            background: #f0f0f0;
        }

        .album-info { padding: 14px 16px; }
        .album-name { font-weight: 600; color: #1a1a1a; margin-bottom: 3px; font-size: 15px; }
        .photo-count { font-size: 13px; color: #888; }

        /* ── Album Detail ── */
        .album-detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .album-detail-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: #1a1a1a;
        }

        .album-photo-count { color: #888; font-size: 13px; margin-top: 2px; }

        /* ── Photo Grid ── */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
        }

        .photo-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
        }

        .photo-item img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .photo-item:hover img { transform: scale(1.06); }

        .photo-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .photo-item:hover .photo-overlay { opacity: 1; }

        /* ── Buttons ── */
        .btn {
            padding: 9px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }

        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5568d3; }
        .btn-secondary { background: #f0f0f0; color: #1a1a1a; }
        .btn-secondary:hover { background: #e0e0e0; }
        .btn-danger { background: #dc3545; color: white; font-size: 13px; padding: 7px 14px; }
        .btn-danger:hover { background: #c82333; }

        /* ── Modals ── */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            margin-bottom: 24px;
            color: #1a1a1a;
        }

        .form-group { margin-bottom: 20px; }

        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            color: #1a1a1a;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #f0f0f0;
            border-radius: 10px;
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            transition: border-color 0.2s;
        }

        .form-input:focus { outline: none; border-color: #667eea; }

        .cover-upload-area {
            border: 2px dashed #d0d0d0;
            border-radius: 10px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            color: #888;
        }

        .cover-upload-area:hover { border-color: #667eea; background: #f8f9fa; }
        .cover-preview { max-width: 100%; max-height: 180px; border-radius: 8px; margin-top: 12px; }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .modal-actions .btn { flex: 1; padding: 12px; }

        /* ── Image lightbox ── */
        .image-modal {
            display: none;
            position: fixed;
            z-index: 2000;
            inset: 0;
            background: rgba(0,0,0,0.95);
        }

        .image-modal.active { display: flex; align-items: center; justify-content: center; }
        .image-modal img { max-width: 90%; max-height: 90%; object-fit: contain; border-radius: 4px; }

        .modal-close {
            position: absolute;
            top: 20px; right: 32px;
            color: white; font-size: 36px; cursor: pointer; line-height: 1;
        }

        /* ── States ── */
        .loading { text-align: center; padding: 60px 20px; color: #999; }

        .spinner {
            width: 36px; height: 36px;
            border: 3px solid #f0f0f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .empty-state { text-align: center; padding: 60px 20px; color: #999; }
        .empty-icon { font-size: 48px; margin-bottom: 16px; }
        .hidden { display: none !important; }

        /* ── Background Picker ── */
        .bg-picker-btn {
            position: absolute;
            bottom: 40px;
            right: 16px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }

        .bg-picker-btn:hover { background: rgba(255,255,255,0.35); }

        .bg-swatches {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }

        .bg-swatch {
            aspect-ratio: 16/7;
            border-radius: 8px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.2s;
        }

        .bg-swatch:hover { transform: scale(1.04); }
        .bg-swatch.selected { border-color: #667eea; box-shadow: 0 0 0 2px white, 0 0 0 4px #667eea; }

        .bg-upload-area {
            border: 2px dashed #d0d0d0;
            border-radius: 10px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            color: #888;
            font-size: 14px;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .bg-upload-area:hover { border-color: #667eea; background: #f8f9fa; color: #667eea; }
        @media (max-width: 768px) {
            .profile-hero { padding: 48px 20px 72px; }
            .profile-name { font-size: 28px; }
            .stats-strip { margin: -24px 12px 0; }
            .about-section, .albums-section { margin-left: 12px; margin-right: 12px; }
            .content-section { padding: 20px; }
            .about-section { padding: 20px; }
            .album-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .photo-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .album-detail-header { flex-direction: column; gap: 12px; align-items: stretch; text-align: center; }
            .modal-content { padding: 24px; width: 95%; }
            .edit-profile-btn { top: 12px; right: 12px; }
        }

        @media (max-width: 480px) {
            .album-grid { grid-template-columns: 1fr 1fr; }
            .stat-number { font-size: 20px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-brand">Michael Pynn</a>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="feed.html">Feed</a></li>
                <li id="authButton" style="margin-left: auto;"></li>
            </ul>
        </div>
    </nav>

    <div class="profile-container">
        <!-- Profile Header — rendered by JS -->
        <div id="profileHeader">
            <div class="loading" style="padding: 80px 20px;">
                <div class="spinner"></div>
                <p>Loading profile...</p>
            </div>
        </div>

        <!-- Albums Section -->
        <div id="albumsSection" class="albums-section hidden">
            <div class="content-section">
                <!-- Albums Grid View -->
                <div id="albumsView">
                    <div class="section-header">
                        <div class="section-title">Photo Albums</div>
                        <button class="btn btn-primary hidden" id="createAlbumBtn">+ New Album</button>
                    </div>
                    <div class="album-grid" id="albumGrid"></div>
                </div>

                <!-- Album Detail View -->
                <div id="albumDetailView" class="hidden">
                    <div class="album-detail-header">
                        <button class="btn btn-secondary" id="backBtn">← Back</button>
                        <div>
                            <h2 class="album-detail-title" id="albumTitle"></h2>
                            <p class="album-photo-count" id="albumPhotoCount"></p>
                        </div>
                        <div>
                            <button class="btn btn-primary hidden" id="uploadPhotosBtn">+ Add Photos</button>
                            <input type="file" id="photoInput" accept="image/*" multiple style="display: none;">
                        </div>
                    </div>
                    <div class="photo-grid" id="photoGrid"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Background Picker Modal -->
    <div class="modal" id="bgPickerModal">
        <div class="modal-content">
            <div class="modal-header">Choose Banner Background</div>
            <div class="form-group">
                <label class="form-label">Gradient Presets</label>
                <div class="bg-swatches" id="bgSwatches"></div>
            </div>
            <div class="form-group">
                <label class="form-label">Custom Photo</label>
                <div class="bg-upload-area" id="bgUploadArea">
                    📷 Click to upload a background photo
                    <input type="file" id="bgPhotoInput" accept="image/*" style="display:none;">
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-primary" id="saveBgBtn">Save</button>
                <button class="btn btn-secondary" id="cancelBgBtn">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Hidden file input for avatar upload -->
    <input type="file" id="avatarInput" accept="image/*" style="display:none;">

    <!-- Create Album Modal -->
    <div class="modal" id="createAlbumModal">
        <div class="modal-content">
            <div class="modal-header">Create New Album</div>
            <div class="form-group">
                <label class="form-label">Album Name</label>
                <input type="text" class="form-input" id="albumNameInput" placeholder="e.g., Summer Vacation" maxlength="50">
            </div>
            <div class="form-group">
                <label class="form-label">Cover Photo</label>
                <div class="cover-upload-area" id="coverUploadArea">
                    <div>📷 Click to select cover photo</div>
                    <input type="file" id="coverInput" accept="image/*" style="display: none;">
                    <img id="coverPreview" class="cover-preview" style="display: none;">
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-primary" id="createAlbumConfirm">Create Album</button>
                <button class="btn btn-secondary" id="cancelAlbumBtn">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Image Lightbox -->
    <div class="image-modal" id="imageModal">
        <span class="modal-close" id="imageModalClose">&times;</span>
        <img id="modalImage" src="" alt="Full size photo">
    </div>

    <!-- Edit About Modal -->
    <div class="modal" id="editAboutModal">
        <div class="modal-content">
            <div class="modal-header">Edit About Me</div>
            <div class="form-group">
                <label class="form-label">About Me</label>
                <textarea id="aboutTextarea" class="form-input" style="min-height: 180px; resize: vertical;" placeholder="Tell people about yourself..."></textarea>
                <div style="font-size: 12px; color: #999; margin-top: 4px;">Press Enter for new paragraphs</div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-primary" id="saveAboutBtn">Save</button>
                <button class="btn btn-secondary" id="cancelAboutBtn">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Bottom Tab Bar -->
    <div class="bottom-tab-bar">
        <div class="bottom-tabs">
            <a href="index.html" class="bottom-tab">
                <span class="bottom-tab-icon">🏠</span>
                <span class="bottom-tab-label">Home</span>
            </a>
            <a href="feed.html" class="bottom-tab">
                <span class="bottom-tab-icon">📸</span>
                <span class="bottom-tab-label">Feed</span>
            </a>
            <a href="#" class="bottom-tab active" id="mobileProfileTab">
                <span class="bottom-tab-icon">👤</span>
                <span class="bottom-tab-label">Profile</span>
            </a>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <script src="auth.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const profileUserId = urlParams.get('user');
        if (!profileUserId) window.location.href = '/task-tracker/index.html';

        let isOwnProfile = false;
        let currentAlbumId = null;
        let selectedCoverFile = null;
        let albumsRef = null;

        // Elements
        const profileHeader    = document.getElementById('profileHeader');
        const albumsSection    = document.getElementById('albumsSection');
        const albumsView       = document.getElementById('albumsView');
        const albumDetailView  = document.getElementById('albumDetailView');
        const albumGrid        = document.getElementById('albumGrid');
        const photoGrid        = document.getElementById('photoGrid');
        const createAlbumBtn   = document.getElementById('createAlbumBtn');
        const createAlbumModal = document.getElementById('createAlbumModal');
        const albumNameInput   = document.getElementById('albumNameInput');
        const coverUploadArea  = document.getElementById('coverUploadArea');
        const coverInput       = document.getElementById('coverInput');
        const coverPreview     = document.getElementById('coverPreview');
        const createAlbumConfirm = document.getElementById('createAlbumConfirm');
        const cancelAlbumBtn   = document.getElementById('cancelAlbumBtn');
        const backBtn          = document.getElementById('backBtn');
        const uploadPhotosBtn  = document.getElementById('uploadPhotosBtn');
        const photoInput       = document.getElementById('photoInput');
        const albumTitle       = document.getElementById('albumTitle');
        const albumPhotoCount  = document.getElementById('albumPhotoCount');
        const imageModal       = document.getElementById('imageModal');
        const modalImage       = document.getElementById('modalImage');
        const imageModalClose  = document.getElementById('imageModalClose');
        const avatarInput      = document.getElementById('avatarInput');

        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = '/task-tracker/landing.html';
                return;
            }
            isOwnProfile = user.uid === profileUserId;
            albumsRef = db.collection('users').doc(profileUserId).collection('albums');
            await loadProfile();
        });

        async function loadProfile() {
            try {
                const profileDoc = await db.collection('users').doc(profileUserId).collection('profile').doc('info').get();
                if (!profileDoc.exists) {
                    profileHeader.innerHTML = '<div class="loading">Profile not found</div>';
                    return;
                }
                const profile = profileDoc.data();

                // Count stats
                const albumsSnapshot = await albumsRef.get();
                let photoCount = 0;
                for (const albumDoc of albumsSnapshot.docs) {
                    const ps = await albumsRef.doc(albumDoc.id).collection('photos').get();
                    photoCount += ps.size;
                }

                // Social links
                let socialLinks = {};
                try {
                    const sd = await db.collection('users').doc(profileUserId).collection('profile').doc('socialLinks').get();
                    if (sd.exists) socialLinks = sd.data();
                } catch(e) {}

                // Extended about
                let extendedAbout = '';
                try {
                    const ad = await db.collection('users').doc(profileUserId).collection('profile').doc('about').get();
                    if (ad.exists) extendedAbout = ad.data().text || '';
                } catch(e) {}

                // Build social links HTML
                const linkDefs = [
                    { key: 'instagram', icon: '📷', label: 'Instagram', url: u => `https://instagram.com/${u.replace('@','')}` },
                    { key: 'linkedin',  icon: '💼', label: 'LinkedIn',  url: u => u.startsWith('http') ? u : `https://linkedin.com/in/${u}` },
                    { key: 'twitter',   icon: '🐦', label: 'Twitter',   url: u => `https://twitter.com/${u.replace('@','')}` },
                    { key: 'github',    icon: '💻', label: 'GitHub',    url: u => `https://github.com/${u.replace('@','')}` },
                ];
                const socialHTML = linkDefs
                    .filter(d => socialLinks[d.key])
                    .map(d => `<a href="${d.url(socialLinks[d.key])}" target="_blank" class="social-icon-link">${d.icon} ${d.label}</a>`)
                    .join('');

                // Voice memo
                const voiceHTML = profile.voiceMemoURL ? `
                    <button class="voice-memo-btn" onclick="toggleVoice(this)">
                        <span class="voice-dot"></span> Hear my intro
                    </button>
                    <div class="voice-player" id="voicePlayer">
                        <audio controls style="width:260px;">
                            <source src="${profile.voiceMemoURL}" type="audio/webm">
                        </audio>
                    </div>
                ` : '';

                // Load saved banner background
                let bannerData = { bgId: 'purple', photoURL: null };
                try {
                    const bd = await db.collection('users').doc(profileUserId).collection('profile').doc('banner').get();
                    if (bd.exists) bannerData = { ...bannerData, ...bd.data() };
                } catch(e) {}

                // Render hero
                profileHeader.innerHTML = `
                    <div class="profile-hero" id="profileHero">
                        <div class="hero-orb"></div>
                        ${isOwnProfile ? `<button class="edit-profile-btn" id="editAboutBtnProfile">Edit Profile</button>` : ''}
                        ${isOwnProfile ? `<button class="bg-picker-btn" id="bgPickerBtn">🎨 Background</button>` : ''}

                        <div class="avatar-wrapper ${isOwnProfile ? 'own-profile' : ''}" id="avatarWrapper">
                            <img src="${profile.photoURL}" class="profile-picture" id="profilePic" alt="${profile.displayName}">
                            ${isOwnProfile ? `<div class="avatar-upload-overlay">📷</div>` : ''}
                        </div>

                        <h1 class="profile-name">${profile.displayName}</h1>
                        ${profile.bio ? `<p class="profile-bio">${profile.bio}</p>` : ''}
                        ${voiceHTML}
                        ${socialHTML ? `<div class="social-row">${socialHTML}</div>` : ''}
                    </div>

                    <div class="stats-strip">
                        <div class="stat-item">
                            <div class="stat-number">${albumsSnapshot.size}</div>
                            <div class="stat-label">Albums</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-number">${photoCount}</div>
                            <div class="stat-label">Photos</div>
                        </div>
                    </div>

                    ${extendedAbout ? `
                        <div class="about-section">
                            <div class="about-section-header">
                                <div class="about-section-title">About</div>
                                ${isOwnProfile ? `<button class="btn-edit-subtle" id="editAboutBtnInline">Edit</button>` : ''}
                            </div>
                            <div class="about-text">${extendedAbout}</div>
                        </div>
                    ` : (isOwnProfile ? `
                        <div class="about-section" style="text-align:center; color:#999;">
                            <p style="margin-bottom:16px;">Add an About section to tell people more about yourself</p>
                            <button class="btn btn-primary" id="addAboutBtn">+ Add About</button>
                        </div>
                    ` : '')}
                `;

                // Wire up avatar click
                document.getElementById('avatarWrapper').addEventListener('click', () => {
                    if (isOwnProfile) {
                        avatarInput.click();
                    } else {
                        modalImage.src = profile.photoURL;
                        imageModal.classList.add('active');
                    }
                });

                // Wire up bg picker button
                if (isOwnProfile) {
                    document.getElementById('bgPickerBtn').addEventListener('click', openBgPicker);
                }

                // Apply saved background
                applyHeroBg(bannerData);

                // Wire up edit about buttons
                setTimeout(() => {
                    ['editAboutBtnProfile', 'editAboutBtnInline', 'addAboutBtn'].forEach(id => {
                        const btn = document.getElementById(id);
                        if (btn) btn.addEventListener('click', openEditAbout);
                    });
                }, 50);

                albumsSection.classList.remove('hidden');
                if (isOwnProfile) createAlbumBtn.classList.remove('hidden');
                loadAlbums();

            } catch(error) {
                console.error('Error loading profile:', error);
                profileHeader.innerHTML = '<div class="loading">Error loading profile</div>';
            }
        }

        // Toggle voice player
        function toggleVoice(btn) {
            const player = document.getElementById('voicePlayer');
            player.classList.toggle('visible');
            btn.style.display = 'none';
        }
        window.toggleVoice = toggleVoice;

        // Avatar upload
        avatarInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            try {
                const user = auth.currentUser;
                const ref = storage.ref(`users/${user.uid}/avatar/${Date.now()}_${file.name}`);
                await ref.put(file);
                const url = await ref.getDownloadURL();
                await db.collection('users').doc(user.uid).collection('profile').doc('info').update({ photoURL: url });
                document.getElementById('profilePic').src = url;
            } catch(err) {
                console.error('Avatar upload error:', err);
                alert('Error uploading photo');
            }
        };

        // ── Background Picker ──
        const BG_PRESETS = [
            { id: 'purple',   css: 'linear-gradient(135deg, #4a3f8f 0%, #667eea 45%, #9b6fd4 80%, #c084fc 100%)' },
            { id: 'ocean',    css: 'linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%)' },
            { id: 'sunset',   css: 'linear-gradient(135deg, #f83600 0%, #f9d423 100%)' },
            { id: 'rose',     css: 'linear-gradient(135deg, #c2185b 0%, #ff6090 50%, #ffb3c1 100%)' },
            { id: 'forest',   css: 'linear-gradient(135deg, #134e5e 0%, #71b280 100%)' },
            { id: 'midnight', css: 'linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%)' },
            { id: 'peach',    css: 'linear-gradient(135deg, #ed8966 0%, #ffb347 100%)' },
            { id: 'slate',    css: 'linear-gradient(135deg, #373b44 0%, #4286f4 100%)' },
        ];

        let selectedBgId = 'purple';
        let selectedBgCSS = BG_PRESETS[0].css;
        let bgPhotoURL = null; // custom photo URL if uploaded

        function initBgPicker(currentBg) {
            const swatches = document.getElementById('bgSwatches');
            if (!swatches) return;

            swatches.innerHTML = '';
            BG_PRESETS.forEach(preset => {
                const swatch = document.createElement('div');
                swatch.className = 'bg-swatch' + (currentBg === preset.id ? ' selected' : '');
                swatch.style.background = preset.css;
                swatch.title = preset.id;
                swatch.addEventListener('click', () => {
                    document.querySelectorAll('.bg-swatch').forEach(s => s.classList.remove('selected'));
                    swatch.classList.add('selected');
                    selectedBgId = preset.id;
                    selectedBgCSS = preset.css;
                    bgPhotoURL = null; // clear custom photo if a preset is selected
                });
                swatches.appendChild(swatch);
            });

            // Upload area
            const uploadArea = document.getElementById('bgUploadArea');
            const bgInput = document.getElementById('bgPhotoInput');
            uploadArea.addEventListener('click', () => bgInput.click());
            bgInput.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                uploadArea.textContent = 'Uploading...';
                try {
                    const user = auth.currentUser;
                    const ref = storage.ref(`users/${user.uid}/banner/${Date.now()}_${file.name}`);
                    await ref.put(file);
                    bgPhotoURL = await ref.getDownloadURL();
                    selectedBgId = 'photo';
                    selectedBgCSS = null;
                    document.querySelectorAll('.bg-swatch').forEach(s => s.classList.remove('selected'));
                    uploadArea.innerHTML = `<img src="${bgPhotoURL}" style="max-height:80px; border-radius:6px; display:block; margin:0 auto;">`;
                } catch(err) {
                    console.error('Banner upload error:', err);
                    uploadArea.textContent = '📷 Click to upload a background photo';
                    alert('Error uploading photo');
                }
            });
        }

        async function openBgPicker() {
            // Load current saved background
            let currentBgId = 'purple';
            try {
                const doc = await db.collection('users').doc(profileUserId).collection('profile').doc('banner').get();
                if (doc.exists) {
                    currentBgId = doc.data().bgId || 'purple';
                    bgPhotoURL = doc.data().photoURL || null;
                }
            } catch(e) {}

            selectedBgId = currentBgId;
            document.getElementById('bgPickerModal').classList.add('active');
            setTimeout(() => initBgPicker(currentBgId), 10);
        }

        async function saveBg() {
            const btn = document.getElementById('saveBgBtn');
            try {
                btn.disabled = true; btn.textContent = 'Saving...';

                const bannerData = {
                    bgId: selectedBgId,
                    photoURL: bgPhotoURL || null,
                    updatedAt: new Date().toISOString()
                };

                await db.collection('users').doc(profileUserId).collection('profile').doc('banner').set(bannerData);

                // Apply immediately to the hero
                applyHeroBg(bannerData);
                document.getElementById('bgPickerModal').classList.remove('active');
            } catch(err) {
                console.error('Error saving banner:', err);
                alert('Error saving background');
            } finally {
                btn.disabled = false; btn.textContent = 'Save';
            }
        }

        function applyHeroBg(bannerData) {
            const hero = document.querySelector('.profile-hero');
            if (!hero) return;
            if (bannerData.photoURL) {
                hero.style.background = `url('${bannerData.photoURL}') center/cover no-repeat`;
            } else {
                const preset = BG_PRESETS.find(p => p.id === bannerData.bgId) || BG_PRESETS[0];
                hero.style.background = preset.css;
            }
        }

        document.getElementById('saveBgBtn').addEventListener('click', saveBg);
        document.getElementById('cancelBgBtn').addEventListener('click', () => {
            document.getElementById('bgPickerModal').classList.remove('active');
        });

        // Edit About modal
        async function openEditAbout() {
            try {
                const ad = await db.collection('users').doc(profileUserId).collection('profile').doc('about').get();
                document.getElementById('aboutTextarea').value = ad.exists ? (ad.data().text || '') : '';
            } catch(e) {
                document.getElementById('aboutTextarea').value = '';
            }
            document.getElementById('editAboutModal').classList.add('active');
        }

        // Albums
        function loadAlbums() {
            albumsRef.orderBy('createdAt', 'desc').onSnapshot((snapshot) => {
                renderAlbums(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
            });
        }

        function renderAlbums(albums) {
            albumGrid.innerHTML = '';
            if (isOwnProfile) {
                const createCard = document.createElement('div');
                createCard.className = 'create-album-card';
                createCard.innerHTML = `<div class="create-icon">＋</div><div>Create Album</div>`;
                createCard.onclick = () => createAlbumModal.classList.add('active');
                albumGrid.appendChild(createCard);
            }
            if (albums.length === 0 && !isOwnProfile) {
                albumGrid.innerHTML = '<div class="empty-state"><div class="empty-icon">📷</div><p>No albums yet</p></div>';
                return;
            }
            albums.forEach(album => {
                const card = document.createElement('div');
                card.className = 'album-card';
                card.innerHTML = `
                    <img src="${album.coverUrl}" class="album-cover" alt="${album.name}">
                    <div class="album-info">
                        <div class="album-name">${album.name}</div>
                        <div class="photo-count">${album.photoCount || 0} photos</div>
                    </div>
                `;
                card.onclick = () => openAlbum(album.id, album.name);
                albumGrid.appendChild(card);
            });
        }

        // Album Modal
        coverUploadArea.onclick = () => coverInput.click();
        coverInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                selectedCoverFile = file;
                const reader = new FileReader();
                reader.onload = (e) => { coverPreview.src = e.target.result; coverPreview.style.display = 'block'; };
                reader.readAsDataURL(file);
            }
        };

        createAlbumBtn.onclick = () => createAlbumModal.classList.add('active');
        cancelAlbumBtn.onclick = () => {
            createAlbumModal.classList.remove('active');
            albumNameInput.value = '';
            coverPreview.style.display = 'none';
            selectedCoverFile = null;
        };

        createAlbumConfirm.onclick = async () => {
            const name = albumNameInput.value.trim();
            if (!name || !selectedCoverFile) { alert('Please provide album name and cover photo'); return; }
            try {
                createAlbumConfirm.disabled = true;
                createAlbumConfirm.textContent = 'Creating...';
                const user = auth.currentUser;
                const coverFileName = `users/${user.uid}/covers/${Date.now()}_${selectedCoverFile.name}`;
                const coverRef = storage.ref(coverFileName);
                await coverRef.put(selectedCoverFile);
                const coverUrl = await coverRef.getDownloadURL();
                await albumsRef.add({ name, coverUrl, coverFileName, photoCount: 0, createdAt: new Date().toISOString() });
                albumNameInput.value = '';
                coverPreview.style.display = 'none';
                selectedCoverFile = null;
                createAlbumModal.classList.remove('active');
            } catch(error) {
                console.error('Error creating album:', error);
                alert('Error creating album');
            } finally {
                createAlbumConfirm.disabled = false;
                createAlbumConfirm.textContent = 'Create Album';
            }
        };

        function openAlbum(albumId, name) {
            currentAlbumId = albumId;
            albumTitle.textContent = name;
            albumsView.classList.add('hidden');
            albumDetailView.classList.remove('hidden');
            if (isOwnProfile) uploadPhotosBtn.classList.remove('hidden');
            loadPhotos(albumId);
        }

        backBtn.onclick = () => {
            currentAlbumId = null;
            albumDetailView.classList.add('hidden');
            albumsView.classList.remove('hidden');
        };

        uploadPhotosBtn.onclick = () => photoInput.click();
        photoInput.onchange = async (e) => {
            const files = e.target.files;
            if (!files.length) return;
            const user = auth.currentUser;
            for (let file of files) {
                if (!file.type.startsWith('image/')) continue;
                const fileName = `users/${user.uid}/albums/${currentAlbumId}/${Date.now()}_${file.name}`;
                const ref = storage.ref(fileName);
                try {
                    await ref.put(file);
                    const url = await ref.getDownloadURL();
                    await albumsRef.doc(currentAlbumId).collection('photos').add({ url, fileName, uploadedAt: new Date().toISOString() });
                    const albumDoc = await albumsRef.doc(currentAlbumId).get();
                    await albumsRef.doc(currentAlbumId).update({ photoCount: (albumDoc.data().photoCount || 0) + 1 });
                } catch(err) { console.error('Upload error:', err); }
            }
            photoInput.value = '';
        };

        function loadPhotos(albumId) {
            albumsRef.doc(albumId).collection('photos').orderBy('uploadedAt', 'desc').onSnapshot((snapshot) => {
                const photos = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                albumPhotoCount.textContent = `${photos.length} photo${photos.length !== 1 ? 's' : ''}`;
                renderPhotos(photos);
            });
        }

        function renderPhotos(photos) {
            if (photos.length === 0) {
                photoGrid.innerHTML = `<div class="empty-state"><div class="empty-icon">📷</div><p>${isOwnProfile ? 'Click "Add Photos" to upload!' : 'No photos yet'}</p></div>`;
                return;
            }
            photoGrid.innerHTML = '';
            photos.forEach(photo => {
                const item = document.createElement('div');
                item.className = 'photo-item';
                item.innerHTML = `
                    <img src="${photo.url}" alt="Photo">
                    ${isOwnProfile ? `<div class="photo-overlay"><button class="btn btn-danger" onclick="event.stopPropagation(); deletePhoto('${photo.id}', '${photo.fileName}')">Delete</button></div>` : ''}
                `;
                item.onclick = (e) => {
                    if (e.target.tagName === 'BUTTON') return;
                    modalImage.src = photo.url;
                    imageModal.classList.add('active');
                };
                photoGrid.appendChild(item);
            });
        }

        async function deletePhoto(photoId, fileName) {
            if (!confirm('Delete this photo?')) return;
            try {
                await storage.ref(fileName).delete();
                await albumsRef.doc(currentAlbumId).collection('photos').doc(photoId).delete();
                const albumDoc = await albumsRef.doc(currentAlbumId).get();
                await albumsRef.doc(currentAlbumId).update({ photoCount: Math.max(0, (albumDoc.data().photoCount || 1) - 1) });
            } catch(err) { console.error('Delete error:', err); alert('Error deleting photo'); }
        }
        window.deletePhoto = deletePhoto;

        imageModalClose.onclick = () => imageModal.classList.remove('active');
        imageModal.onclick = (e) => { if (e.target === imageModal) imageModal.classList.remove('active'); };

        // Edit About
        const editAboutModal = document.getElementById('editAboutModal');
        document.getElementById('cancelAboutBtn').onclick = () => editAboutModal.classList.remove('active');
        document.getElementById('saveAboutBtn').onclick = async () => {
            const btn = document.getElementById('saveAboutBtn');
            const text = document.getElementById('aboutTextarea').value.trim();
            try {
                btn.disabled = true; btn.textContent = 'Saving...';
                await db.collection('users').doc(profileUserId).collection('profile').doc('about').set({ text, updatedAt: new Date().toISOString() });
                editAboutModal.classList.remove('active');
                await loadProfile();
            } catch(err) {
                console.error('Save error:', err);
                alert('Error saving. Please try again.');
            } finally {
                btn.disabled = false; btn.textContent = 'Save';
            }
        };

        // Mobile tab
        auth.onAuthStateChanged((user) => {
            const tab = document.getElementById('mobileProfileTab');
            if (tab && user) tab.href = `/task-tracker/profile.html?user=${user.uid}`;
        });
    </script>
</body>
</html>
