<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Your Profile</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .setup-container {
            background: white;
            border-radius: 24px;
            padding: 48px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .setup-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .setup-header h1 {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .setup-header p {
            color: #666;
            font-size: 16px;
        }

        .profile-picture-upload {
            text-align: center;
            margin-bottom: 32px;
        }

        .profile-picture-preview {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin: 0 auto 16px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 4px solid #667eea;
            cursor: pointer;
            transition: all 0.3s;
        }

        .profile-picture-preview:hover {
            border-color: #5568d3;
            transform: scale(1.05);
        }

        .profile-picture-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-picture-placeholder {
            font-size: 64px;
            color: #ccc;
        }

        .upload-btn {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }

        .upload-btn:hover { background: #5568d3; }

        .form-group { margin-bottom: 24px; }

        .form-label {
            display: block;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #f0f0f0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .submit-btn:hover { background: #5568d3; }
        .submit-btn:disabled { background: #ccc; cursor: not-allowed; }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: none;
        }

        .required { color: #dc3545; }
    </style>
</head>
<body>
    <div class="setup-container">
        <div class="setup-header">
            <h1>Complete Your Profile</h1>
            <p>Let's get you set up! Add a profile picture and some info.</p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="profile-picture-upload">
            <div class="profile-picture-preview" id="profilePicturePreview" onclick="document.getElementById('profilePictureInput').click()">
                <div class="profile-picture-placeholder" id="picturePlaceholder">📷</div>
                <img id="picturePreviewImg" style="display: none;">
            </div>
            <input type="file" id="profilePictureInput" accept="image/*" style="display: none;">
            <button class="upload-btn" onclick="document.getElementById('profilePictureInput').click()">
                Choose Profile Picture <span class="required">*</span>
            </button>
        </div>

        <div class="form-group">
            <label class="form-label">Display Name <span class="required">*</span></label>
            <input type="text" id="displayNameInput" class="form-input" placeholder="How should we call you?" maxlength="50">
        </div>

        <div class="form-group">
            <label class="form-label">Introduce Yourself (Voice Memo) <span class="required">*</span></label>
            <div style="text-align: center; padding: 20px; background: #f8f9fa; border-radius: 8px;">
                <button type="button" id="recordBtn" style="width: 80px; height: 80px; border-radius: 50%; border: none; background: #667eea; color: white; font-size: 32px; cursor: pointer; margin-bottom: 12px; transition: all 0.3s;">
                    🎤
                </button>
                <div id="recordingStatus" style="font-size: 14px; color: #666; margin-bottom: 8px;">Click to start recording</div>
                <div id="recordingTimer" style="font-size: 24px; font-weight: 600; color: #1a1a1a; display: none;">0:00</div>
                <audio id="audioPlayback" controls style="width: 100%; margin-top: 12px; display: none;"></audio>
            </div>
            <div style="font-size: 12px; color: #999; margin-top: 8px; text-align: center;">Record a 5-60 second voice introduction</div>
        </div>

        <button class="submit-btn" id="submitBtn">Complete Profile</button>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <script src="auth.js"></script>

    <script>
        let selectedFile = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let recordingTimer = null;
        let recordingSeconds = 0;
        let audioBlob = null;

        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = '/task-tracker/index.html';
                return;
            }
            const profileDoc = await db.collection('users').doc(user.uid).collection('profile').doc('info').get();
            if (profileDoc.exists) {
                window.location.href = '/task-tracker/index.html';
            }
            if (user.displayName) {
                document.getElementById('displayNameInput').value = user.displayName;
            }
        });

        document.getElementById('profilePictureInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                selectedFile = file;
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('picturePlaceholder').style.display = 'none';
                    const img = document.getElementById('picturePreviewImg');
                    img.src = e.target.result;
                    img.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        const recordBtn = document.getElementById('recordBtn');
        const recordingStatus = document.getElementById('recordingStatus');
        const recordingTimerDisplay = document.getElementById('recordingTimer');
        const audioPlayback = document.getElementById('audioPlayback');

        recordBtn.addEventListener('click', async () => {
            if (!mediaRecorder || mediaRecorder.state === 'inactive') {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    recordingSeconds = 0;

                    mediaRecorder.ondataavailable = (event) => audioChunks.push(event.data);

                    mediaRecorder.onstop = () => {
                        audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const audioUrl = URL.createObjectURL(audioBlob);
                        audioPlayback.src = audioUrl;
                        audioPlayback.style.display = 'block';
                        recordingStatus.textContent = 'Recording saved! Play to listen';
                        recordBtn.textContent = '🎤';
                        recordBtn.style.background = '#667eea';
                        stream.getTracks().forEach(track => track.stop());
                    };

                    mediaRecorder.start();
                    recordBtn.textContent = '⏹️';
                    recordBtn.style.background = '#dc3545';
                    recordingStatus.textContent = 'Recording... (click to stop)';
                    recordingTimerDisplay.style.display = 'block';

                    recordingTimer = setInterval(() => {
                        recordingSeconds++;
                        const mins = Math.floor(recordingSeconds / 60);
                        const secs = recordingSeconds % 60;
                        recordingTimerDisplay.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
                        if (recordingSeconds >= 60) recordBtn.click();
                    }, 1000);

                } catch (error) {
                    alert('Could not access microphone. Please allow microphone access.');
                }
            } else {
                mediaRecorder.stop();
                clearInterval(recordingTimer);
                recordingTimerDisplay.style.display = 'none';
            }
        });

        document.getElementById('submitBtn').addEventListener('click', async () => {
            const errorMessage = document.getElementById('errorMessage');
            const displayName = document.getElementById('displayNameInput').value.trim();

            if (!selectedFile) {
                errorMessage.textContent = 'Please upload a profile picture';
                errorMessage.style.display = 'block';
                return;
            }

            if (!displayName) {
                errorMessage.textContent = 'Please enter a display name';
                errorMessage.style.display = 'block';
                return;
            }

            if (!audioBlob) {
                errorMessage.textContent = 'Please record a voice introduction';
                errorMessage.style.display = 'block';
                return;
            }

            if (recordingSeconds < 5) {
                errorMessage.textContent = 'Voice memo must be at least 5 seconds';
                errorMessage.style.display = 'block';
                return;
            }

            errorMessage.style.display = 'none';
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').textContent = 'Creating Profile...';

            try {
                const user = auth.currentUser;

                const fileName = `profile-pictures/${user.uid}/${Date.now()}_${selectedFile.name}`;
                const storageRef = storage.ref(fileName);
                await storageRef.put(selectedFile);
                const photoURL = await storageRef.getDownloadURL();

                const voiceFileName = `voice-memos/${user.uid}/${Date.now()}.webm`;
                const voiceRef = storage.ref(voiceFileName);
                await voiceRef.put(audioBlob);
                const voiceURL = await voiceRef.getDownloadURL();

                await db.collection('users').doc(user.uid).collection('profile').doc('info').set({
                    displayName: displayName,
                    bio: 'Listen to my voice intro!',
                    voiceMemoURL: voiceURL,
                    voiceMemoDuration: recordingSeconds,
                    photoURL: photoURL,
                    email: user.email,
                    createdAt: new Date().toISOString()
                });

                window.location.href = '/task-tracker/index.html';
            } catch (error) {
                console.error('Error creating profile:', error);
                errorMessage.textContent = 'Error creating profile. Please try again.';
                errorMessage.style.display = 'block';
                document.getElementById('submitBtn').disabled = false;
                document.getElementById('submitBtn').textContent = 'Complete Profile';
            }
        });
    </script>
</body>
</html>
