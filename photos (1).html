<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photos - Michael Pynn</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .photo-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .upload-section {
            margin-bottom: 30px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            background: #f8f9fa;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-area:hover {
            background: #e9ecef;
            border-color: #5568d3;
        }

        .upload-area.dragging {
            background: #e9ecef;
            border-color: #5568d3;
        }

        #fileInput {
            display: none;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #666;
            font-size: 16px;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .photo-item {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
            aspect-ratio: 1;
        }

        .photo-item:hover {
            transform: scale(1.05);
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .photo-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            padding: 15px;
            transform: translateY(100%);
            transition: transform 0.3s;
        }

        .photo-item:hover .photo-overlay {
            transform: translateY(0);
        }

        .photo-date {
            color: white;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .delete-photo-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        .upload-progress {
            display: none;
            text-align: center;
            color: #667eea;
            margin-top: 10px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        /* Modal for full size image */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            padding: 20px;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 40px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-brand">Michael Pynn</a>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="tasks.html">Tasks</a></li>
                <li><a href="photos.html" class="active">Photos</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="photo-container">
            <div class="page-header">
                <h1>Photo Gallery</h1>
                <p class="date">Your memories</p>
            </div>

            <div class="content-card upload-section">
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📸</div>
                    <div class="upload-text">Click or drag photos here to upload</div>
                    <input type="file" id="fileInput" accept="image/*" multiple>
                </div>
                <div class="upload-progress" id="uploadProgress">Uploading...</div>
            </div>

            <div class="content-card">
                <div class="photo-grid" id="photoGrid"></div>
            </div>
        </div>
    </div>

    <!-- Modal for full size view -->
    <div class="modal" id="modal">
        <span class="modal-close" id="modalClose">&times;</span>
        <img id="modalImage" src="" alt="Full size photo">
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <script>
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyB_EmP-qufcH2ZAymdKK_qn_9B_nXjcgwc",
            authDomain: "michael-new-website.firebaseapp.com",
            projectId: "michael-new-website",
            storageBucket: "michael-new-website.firebasestorage.app",
            messagingSenderId: "149129540182",
            appId: "1:149129540182:web:ea47a8eaa08181ecd6c1f7",
            measurementId: "G-8R2FKQ3XMN"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        // Get elements
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const uploadProgress = document.getElementById('uploadProgress');
        const photoGrid = document.getElementById('photoGrid');
        const modal = document.getElementById('modal');
        const modalImage = document.getElementById('modalImage');
        const modalClose = document.getElementById('modalClose');

        // Reference to photos collection
        const photosRef = db.collection('photos');

        // Upload area click
        uploadArea.addEventListener('click', () => fileInput.click());

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragging');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragging');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragging');
            const files = e.dataTransfer.files;
            handleFiles(files);
        });

        // File input change
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        // Handle file uploads
        async function handleFiles(files) {
            if (files.length === 0) return;

            uploadProgress.style.display = 'block';

            for (let file of files) {
                if (!file.type.startsWith('image/')) continue;

                const fileName = `${Date.now()}_${file.name}`;
                const storageRef = storage.ref(`photos/${fileName}`);

                try {
                    // Upload file
                    await storageRef.put(file);
                    
                    // Get download URL
                    const url = await storageRef.getDownloadURL();

                    // Save metadata to Firestore
                    await photosRef.add({
                        url: url,
                        fileName: fileName,
                        uploadedAt: new Date().toISOString()
                    });
                } catch (error) {
                    console.error("Error uploading photo:", error);
                }
            }

            uploadProgress.style.display = 'none';
            fileInput.value = '';
        }

        // Render photos
        function renderPhotos(photos) {
            if (photos.length === 0) {
                photoGrid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📷</div>
                        <p>No photos yet. Upload some to get started!</p>
                    </div>
                `;
                return;
            }

            photoGrid.innerHTML = '';

            photos.forEach(photo => {
                const photoItem = document.createElement('div');
                photoItem.className = 'photo-item';
                
                const date = new Date(photo.uploadedAt).toLocaleDateString('en-US', {
                    month: 'short',
                    day: 'numeric',
                    year: 'numeric'
                });

                photoItem.innerHTML = `
                    <img src="${photo.url}" alt="Photo">
                    <div class="photo-overlay">
                        <div class="photo-date">${date}</div>
                        <button class="delete-photo-btn" data-id="${photo.id}">Delete</button>
                    </div>
                `;

                // Click to view full size
                photoItem.querySelector('img').addEventListener('click', () => {
                    modalImage.src = photo.url;
                    modal.classList.add('active');
                });

                // Delete button
                photoItem.querySelector('.delete-photo-btn').addEventListener('click', async (e) => {
                    e.stopPropagation();
                    if (confirm('Delete this photo?')) {
                        try {
                            // Delete from Storage
                            const storageRef = storage.ref(`photos/${photo.fileName}`);
                            await storageRef.delete();
                            
                            // Delete from Firestore
                            await photosRef.doc(photo.id).delete();
                        } catch (error) {
                            console.error("Error deleting photo:", error);
                        }
                    }
                });

                photoGrid.appendChild(photoItem);
            });
        }

        // Close modal
        modalClose.addEventListener('click', () => {
            modal.classList.remove('active');
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
            }
        });

        // Real-time listener
        photosRef.orderBy('uploadedAt', 'desc').onSnapshot((snapshot) => {
            const photos = [];
            snapshot.forEach(doc => {
                photos.push({
                    id: doc.id,
                    ...doc.data()
                });
            });
            renderPhotos(photos);
        });
    </script>
</body>
</html>
