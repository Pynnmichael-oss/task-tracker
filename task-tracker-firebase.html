<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Task Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .date {
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }
        
        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        
        #taskInput {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        
        #taskInput:focus {
            outline: none;
            border-color: #667eea;
        }
        
        #addBtn {
            padding: 12px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }
        
        #addBtn:hover {
            background: #5568d3;
        }
        
        #taskList {
            list-style: none;
        }
        
        .task-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            margin-bottom: 10px;
            border-radius: 8px;
            transition: all 0.3s;
        }
        
        .task-item:hover {
            background: #e9ecef;
        }
        
        .task-item.completed {
            opacity: 0.6;
        }
        
        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #999;
        }
        
        .task-checkbox {
            width: 20px;
            height: 20px;
            margin-right: 15px;
            cursor: pointer;
        }
        
        .task-text {
            flex: 1;
            font-size: 16px;
            color: #333;
        }
        
        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .delete-btn:hover {
            background: #c82333;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .sync-status {
            text-align: center;
            font-size: 12px;
            color: #28a745;
            margin-bottom: 15px;
        }

        .sync-status.syncing {
            color: #ffc107;
        }

        .sync-status.error {
            color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Daily Task Tracker</h1>
        <div class="date" id="currentDate"></div>
        <div class="sync-status" id="syncStatus">Connecting...</div>
        
        <div class="input-section">
            <input type="text" id="taskInput" placeholder="What do you need to do today?">
            <button id="addBtn">Add Task</button>
        </div>
        
        <ul id="taskList"></ul>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAo40m_DXEshp6ETIsga4Jg41akh1GZOXg",
            authDomain: "michael-productivity-app.firebaseapp.com",
            projectId: "michael-productivity-app",
            storageBucket: "michael-productivity-app.firebasestorage.app",
            messagingSenderId: "166549731610",
            appId: "1:166549731610:web:b1c2b1be975011f2f254a3",
            measurementId: "G-3H1YT45455"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Get elements
        const dateElement = document.getElementById('currentDate');
        const taskInput = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const taskList = document.getElementById('taskList');
        const syncStatus = document.getElementById('syncStatus');

        // Display current date
        const today = new Date();
        const dateString = today.toLocaleDateString('en-US', { 
            weekday: 'long', 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric' 
        });
        dateElement.textContent = dateString;

        // Get today's date as ID (YYYY-MM-DD)
        const todayId = today.toISOString().split('T')[0];

        // Reference to today's tasks
        const todayTasksRef = db.collection('tasks').doc(todayId);

        // Update sync status
        function updateSyncStatus(status, message) {
            syncStatus.className = 'sync-status ' + status;
            syncStatus.textContent = message;
        }

        // Render tasks
        function renderTasks(tasks) {
            taskList.innerHTML = '';
            
            if (!tasks || tasks.length === 0) {
                taskList.innerHTML = '<div class="empty-state">No tasks yet. Add one to get started!</div>';
                return;
            }
            
            tasks.forEach((task, index) => {
                const li = document.createElement('li');
                li.className = 'task-item' + (task.completed ? ' completed' : '');
                li.innerHTML = `
                    <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''}>
                    <span class="task-text">${task.text}</span>
                    <button class="delete-btn">Delete</button>
                `;
                
                // Checkbox event
                li.querySelector('.task-checkbox').addEventListener('change', async () => {
                    updateSyncStatus('syncing', 'Syncing...');
                    task.completed = !task.completed;
                    await todayTasksRef.set({ tasks: tasks });
                });
                
                // Delete event
                li.querySelector('.delete-btn').addEventListener('click', async () => {
                    updateSyncStatus('syncing', 'Syncing...');
                    tasks.splice(index, 1);
                    await todayTasksRef.set({ tasks: tasks });
                });
                
                taskList.appendChild(li);
            });
        }

        // Add task
        async function addTask() {
            const text = taskInput.value.trim();
            if (text === '') return;
            
            updateSyncStatus('syncing', 'Adding task...');
            
            try {
                const doc = await todayTasksRef.get();
                const currentTasks = doc.exists ? doc.data().tasks || [] : [];
                
                currentTasks.push({
                    text: text,
                    completed: false,
                    timestamp: new Date().toISOString()
                });
                
                await todayTasksRef.set({ tasks: currentTasks });
                taskInput.value = '';
            } catch (error) {
                console.error("Error adding task:", error);
                updateSyncStatus('error', 'Error adding task');
            }
        }

        // Event listeners
        addBtn.addEventListener('click', addTask);
        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });

        // Real-time listener
        todayTasksRef.onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                renderTasks(data.tasks || []);
                updateSyncStatus('', '✓ Synced');
            } else {
                renderTasks([]);
                updateSyncStatus('', '✓ Ready');
            }
        }, (error) => {
            console.error("Error listening to tasks:", error);
            updateSyncStatus('error', 'Connection error');
        });
    </script>
</body>
</html>
