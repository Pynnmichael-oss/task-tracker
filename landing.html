<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Michael Pynn</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .landing-container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        .logo {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 50%;
            margin: 0 auto 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 700;
            color: #667eea;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 48px;
            font-weight: 700;
            color: white;
            margin-bottom: 16px;
            letter-spacing: -1px;
        }

        .tagline {
            font-size: 20px;
            color: rgba(255,255,255,0.9);
            margin-bottom: 48px;
            line-height: 1.6;
        }

        .sign-in-box {
            background: white;
            border-radius: 16px;
            padding: 48px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .sign-in-title {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 12px;
        }

        .sign-in-description {
            color: #666;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .sign-in-btn {
            width: 100%;
            padding: 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .sign-in-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
        }

        .google-icon {
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 4px;
            padding: 4px;
        }

        .features {
            margin-top: 32px;
            text-align: left;
        }

        .feature {
            display: flex;
            align-items: start;
            gap: 12px;
            margin-bottom: 16px;
            color: #666;
        }

        .feature-icon {
            font-size: 20px;
            flex-shrink: 0;
        }

        .spinner {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .sign-in-btn.loading .spinner {
            display: block;
        }

        .sign-in-btn.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 36px;
            }

            .tagline {
                font-size: 18px;
            }

            .sign-in-box {
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="landing-container">
        <div class="logo">MP</div>
        <h1>Welcome</h1>
        <p class="tagline">Connect, share, and stay organized with friends</p>

        <div class="sign-in-box">
            <h2 class="sign-in-title">Get Started</h2>
            <p class="sign-in-description">Create an account to join the community and start sharing</p>
            
            <button class="sign-in-btn" id="signInBtn">
                <svg class="google-icon" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                <span class="btn-text">Continue with Google</span>
                <div class="spinner"></div>
            </button>

            <div class="features">
                <div class="feature">
                    <span class="feature-icon">📸</span>
                    <span>Share photos and create albums</span>
                </div>
                <div class="feature">
                    <span class="feature-icon">💬</span>
                    <span>Connect with friends and comment</span>
                </div>
                <div class="feature">
                    <span class="feature-icon">✨</span>
                    <span>Personalize your profile and dashboard</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="auth.js"></script>

    <script>
        const signInBtn = document.getElementById('signInBtn');

        // Check if already logged in
        auth.onAuthStateChanged((user) => {
            if (user) {
                // Already logged in - redirect to home
                window.location.href = '/task-tracker/index.html';
            }
        });

        // Sign in handler
        signInBtn.addEventListener('click', async () => {
            signInBtn.classList.add('loading');
            signInBtn.disabled = true;

            try {
                await signInWithGoogle();
                // Auth state listener will redirect
            } catch (error) {
                console.error('Sign in error:', error);
                alert('Sign in failed. Please try again.');
                signInBtn.classList.remove('loading');
                signInBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
