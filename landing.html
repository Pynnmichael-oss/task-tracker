<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/task-tracker/manifest.json">
    <meta name="theme-color" content="#3d9c2f">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="TouchGrass">
    <link rel="apple-touch-icon" href="/task-tracker/icons/icon-192.png">
    <title>TouchGrass</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,900&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #f0faf0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated grass background */
        .bg-blades {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .blade {
            position: absolute;
            bottom: 0;
            transform-origin: bottom center;
            animation: sway 3s ease-in-out infinite;
        }

        @keyframes sway {
            0%, 100% { transform: rotate(-4deg); }
            50% { transform: rotate(4deg); }
        }

        /* Stagger sway per blade */
        .blade:nth-child(2) { animation-delay: 0.3s; }
        .blade:nth-child(3) { animation-delay: 0.6s; }
        .blade:nth-child(4) { animation-delay: 0.9s; }
        .blade:nth-child(5) { animation-delay: 1.2s; }
        .blade:nth-child(6) { animation-delay: 0.15s; }
        .blade:nth-child(7) { animation-delay: 0.45s; }
        .blade:nth-child(8) { animation-delay: 0.75s; }

        /* Main card */
        .landing-card {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 60px 48px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            border: 1px solid rgba(255,255,255,0.9);
            box-shadow: 0 24px 80px rgba(45,122,34,0.12);
            max-width: 420px;
            width: 90%;
            animation: rise 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Big logo */
        .logo-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 12px;
        }

        .logo-svg {
            width: 64px;
            height: 64px;
            filter: drop-shadow(0 4px 12px rgba(61,156,47,0.3));
        }

        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 52px;
            font-weight: 900;
            font-style: italic;
            background: linear-gradient(135deg, #1e6b14, #6dd832);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -2px;
            line-height: 1;
        }

        .tagline {
            font-size: 15px;
            color: #888;
            font-weight: 300;
            margin-bottom: 40px;
            letter-spacing: 0.2px;
        }

        .tagline em {
            color: #3d9c2f;
            font-style: normal;
            font-weight: 600;
        }

        /* Sign in button */
        .signin-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 32px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            font-family: 'DM Sans', sans-serif;
        }

        .signin-btn:hover {
            border-color: #3d9c2f;
            box-shadow: 0 4px 16px rgba(61,156,47,0.15);
            transform: translateY(-1px);
        }

        .signin-btn:active { transform: translateY(0); }

        .google-icon {
            width: 22px;
            height: 22px;
        }

        .signin-note {
            font-size: 12px;
            color: #bbb;
            margin-top: 16px;
        }

        /* Error */
        .error-msg {
            background: #fee;
            color: #c33;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
    </style>
</head>
<body>

    <!-- Animated grass blades in background -->
    <div class="bg-blades">
        <svg class="blade" style="left:5%; width:60px; height:220px;" viewBox="0 0 60 220">
            <path d="M30 220 C30 220 10 140 20 20 C20 20 30 100 40 220 Z" fill="#6dd83260"/>
        </svg>
        <svg class="blade" style="left:12%; width:40px; height:160px;" viewBox="0 0 40 160">
            <path d="M20 160 C20 160 5 100 12 10 C12 10 20 80 28 160 Z" fill="#3d9c2f50"/>
        </svg>
        <svg class="blade" style="left:20%; width:50px; height:200px;" viewBox="0 0 50 200">
            <path d="M25 200 C25 200 8 120 15 15 C15 15 25 90 35 200 Z" fill="#4ab83055"/>
        </svg>
        <svg class="blade" style="right:5%; width:60px; height:230px;" viewBox="0 0 60 230">
            <path d="M30 230 C30 230 10 145 22 18 C22 18 32 105 42 230 Z" fill="#6dd83260"/>
        </svg>
        <svg class="blade" style="right:13%; width:45px; height:170px;" viewBox="0 0 45 170">
            <path d="M22 170 C22 170 6 105 14 12 C14 12 22 85 30 170 Z" fill="#3d9c2f50"/>
        </svg>
        <svg class="blade" style="right:22%; width:55px; height:195px;" viewBox="0 0 55 195">
            <path d="M27 195 C27 195 9 118 18 14 C18 14 27 88 37 195 Z" fill="#4ab83055"/>
        </svg>
        <svg class="blade" style="left:50%; transform:translateX(-50%); width:70px; height:140px; bottom:0; opacity:0.3;" viewBox="0 0 70 140">
            <path d="M35 140 C35 140 12 85 22 8 C22 8 35 65 48 140 Z" fill="#7ec832"/>
        </svg>
    </div>

    <div class="landing-card">
        <!-- Logo -->
        <div class="logo-wrap">
            <svg class="logo-svg" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Left blade -->
                <path d="M16 56 C16 56 10 36 20 10 C20 10 24 30 18 56 Z" fill="#4ab830"/>
                <!-- Center blade -->
                <path d="M32 56 C32 56 24 26 32 2 C32 2 40 26 32 56 Z" fill="#6dd832"/>
                <!-- Right blade -->
                <path d="M48 56 C48 56 40 36 44 10 C44 10 54 30 48 56 Z" fill="#4ab830"/>
                <!-- Ground -->
                <rect x="6" y="54" width="52" height="7" rx="3.5" fill="#2d7a22"/>
            </svg>
            <div class="logo-text">TouchGrass</div>
        </div>

        <p class="tagline">chronically online, <em>occasionally outside</em></p>

        <div class="error-msg" id="errorMsg"></div>

        <button class="signin-btn" onclick="handleSignIn()">
            <!-- Google G icon -->
            <svg class="google-icon" viewBox="0 0 24 24">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Continue with Google
        </button>

        <p class="signin-note">No account needed — just your Google account</p>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <script src="auth.js"></script>

    <script>
  auth.getRedirectResult().then(result => {
    console.log('REDIRECT RESULT:', result);
  }).catch(err => {
    console.error('REDIRECT ERROR:', err.code, err.message);
  });
</script>
    
  <script>
        async function handleSignIn() {
            const errorMsg = document.getElementById('errorMsg');
            try {
                errorMsg.style.display = 'none';
                await signInWithGoogle();
            } catch(e) {
                errorMsg.textContent = 'Sign in failed. Please try again.';
                errorMsg.style.display = 'block';
            }
        }
    </script>
</body>
</html>
